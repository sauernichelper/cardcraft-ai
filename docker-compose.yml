version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cardcraft-db
    environment:
      POSTGRES_USER: cardcraft
      POSTGRES_PASSWORD: cardcraft_secret
      POSTGRES_DB: cardcraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardcraft"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: cardcraft-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Für GPU-Unterstützung (optional):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  postgres_data:
  ollama_data:
